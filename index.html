<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paul Bosmans — Portfolio</title>
  <meta name="description" content="Portfolio of Paul Bosmans — Microtechnology engineer focused on mechanical design, rapid prototyping, and industrialization." />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/android-chrome-512x512.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <div class="layout">
    <!-- MAIN CONTENT -->
    <main class="content" id="top">

      <!-- HERO -->
      <header class="card hero">
        <div class="hero-left">
          <p class="hero-role">Microtechnology Engineer</p>
          <h1 class="hero-name">Paul Bosmans</h1>
          <div class="quick" id="quickInfo"></div>
        </div>

        <div class="hero-right">
          <figure class="avatar" aria-label="Portrait">
            <img src="assets/paul.jpg" alt="Paul Bosmans portrait"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
            <div class="avatar-fallback" style="display:none;">
              Place your portrait at<br><b>assets/paul.jpg</b>
            </div>
          </figure>
        </div>

        <div class="hero-embedded">
          <div class="hero-block" id="summary">
            <h2>Summary</h2>
            <div class="p" id="summaryText"></div>
          </div>

          <div class="hero-block" id="skills">
            <h2>Skills</h2>
            <div class="skills-grid" id="skillsGrid"></div>
          </div>
        </div>
      </header>

      <!-- PROJECTS -->
      <section class="card section" id="projects">
        <div class="section-head">
          <h2>Selected Projects</h2>
          <p>Drone R&amp;D · Industrialization · Product</p>
        </div>

        <div class="grid" id="projectsGrid"></div>

        <p class="note" id="projectsNote"></p>
      </section>

      <!-- CONTACT -->
      <section class="card section" id="contact">
        <div class="section-head">
          <h2>Contact</h2>
          <p>Fast & direct</p>
        </div>

        <p class="p" id="contactIntro"></p>
        <div class="actions" style="margin-top:10px;" id="contactActions"></div>

        <footer class="footer">© <span id="year"></span> Paul Bosmans · Portfolio</footer>
      </section>
    </main>

  </div>

  <div class="lightbox" id="mediaLightbox" aria-hidden="true">
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
    <div class="lightbox-panel" role="dialog" aria-modal="true" aria-label="Media preview">
      <button class="lightbox-close" id="lightboxClose" aria-label="Close preview">×</button>
      <img id="lightboxImage" alt="Expanded project media" />
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
